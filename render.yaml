services:
  - type: web
    name: autovault-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render generates a random value
      - key: JWT_EXPIRE
        value: 30d
      - key: CLIENT_URL
        sync: false          # Set to your Vercel frontend URL
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
